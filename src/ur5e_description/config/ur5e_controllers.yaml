controller_manager:
  ros__parameters:
    update_rate: 100

joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster

force_torque_sensor_broadcaster:
  ros__parameters:
    type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    sensor_name: fts_sensor
    frame_id: tool0

arm_controller:
  ros__parameters:
    type: forward_command_controller/ForwardCommandController
    interface_name: position
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

cartesian_compliance_controller:
  ros__parameters:
    type: cartesian_compliance_controller/CartesianComplianceController
    end_effector_link: "tool0"
    robot_base_link: "base_link"
    ft_sensor_ref_link: "tool0"
    compliance_ref_link: "tool0"
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    stiffness:
      trans_x: 500.0
      trans_y: 500.0
      trans_z: 500.0
      rot_x: 20.0
      rot_y: 20.0
      rot_z: 20.0
    solver:
      error_scale: 0.5
      iterations: 4
      publish_state_feedback: True
    pd_gains:
      trans_x: { p: 0.05, d: 0.005 }
      trans_y: { p: 0.05, d: 0.005 }
      trans_z: { p: 0.05, d: 0.005 }
      rot_x: { p: 1.5 }
      rot_y: { p: 1.5 }
      rot_z: { p: 1.5 }

motion_control_handle:
  ros__parameters:
    type: cartesian_controller_handles/MotionControlHandle
    end_effector_link: "tool0"
    robot_base_link: "base_link"
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
